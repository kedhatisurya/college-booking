<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>College Resource Booking</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/home.css">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #f4f7fb;
    }

    .topbar {
      background: linear-gradient(90deg, #1e3c72, #2a5298);
      color: white;
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
    }

    .topbar button {
      background: #ff4c4c;
      border: none;
      color: white;
      padding: 8px 15px;
      border-radius: 5px;
      cursor: pointer;
    }

    .dashboard {
      padding: 30px;
    }

    .section-title {
      margin: 20px 0;
      color: #333;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
    }

    .card {
      padding: 20px;
      border-radius: 15px;
      color: white;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      text-align: center;
    }

    .card h4 {
      margin: 0 0 5px 0;
      font-size: 16px;
    }

    .card p {
      margin: 5px 0;
      font-size: 13px;
      opacity: 0.9;
    }

    .card button {
      margin-top: 12px;
      padding: 8px;
      width: 100%;
      border: none;
      border-radius: 8px;
      background: rgba(255,255,255,0.9);
      cursor: pointer;
      font-weight: bold;
      color: #333;
    }

    .lab1 { background: linear-gradient(135deg, #00b4db, #0083b0); }
    .lab2 { background: linear-gradient(135deg, #4e54c8, #8f94fb); }
    .lab3 { background: linear-gradient(135deg, #f7971e, #ffd200); }
    .hall { background: linear-gradient(135deg, #ff9966, #ff5e62); }
    .seminar { background: linear-gradient(135deg, #c94b4b, #4b134f); }
    .projector { background: linear-gradient(135deg, #56ab2f, #a8e063); }
    .auditorium { background: linear-gradient(135deg, #373b44, #4286f4); }
    .conference { background: linear-gradient(135deg, #11998e, #38ef7d); }

    .booking-panel {
      margin-top: 30px;
      background: white;
      padding: 25px;
      border-radius: 12px;
      display: none;
      max-width: 400px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    .booking-panel label {
      font-weight: bold;
      color: #333;
      font-size: 14px;
    }

    .booking-panel input,
    .booking-panel select {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 6px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }

    .booking-panel button {
      background: #2a5298;
      color: white;
      border: none;
      cursor: pointer;
      width: 100%;
      padding: 10px;
      border-radius: 6px;
      margin-top: 5px;
      font-size: 15px;
    }

    table {
      width: 100%;
      margin-top: 20px;
      border-collapse: collapse;
      background: white;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 3px 10px rgba(0,0,0,0.08);
    }

    th, td {
      padding: 12px;
      text-align: center;
      border-bottom: 1px solid #ddd;
      font-size: 14px;
    }

    th {
      background: #2a5298;
      color: white;
    }

    tr:hover {
      background: #f9f9f9;
    }

    .conflict-row {
      background: #fff3cd !important;
      border-left: 4px solid #ff9800;
    }

    .conflict-badge {
      background: #ff9800;
      color: white;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: bold;
    }

    .btn-approve,
    .btn-reject,
    .btn-delete {
      border: none;
      padding: 5px 10px;
      border-radius: 5px;
      cursor: pointer;
      margin: 2px;
      color: white;
    }

    .btn-approve { background: #28a745; }
    .btn-reject { background: #dc3545; }
    .btn-delete { background: #dc3545; }

    #msg {
      margin-top: 10px;
      font-weight: bold;
    }

    .filter-bar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin: 15px 0;
    }

    .filter-bar select {
      padding: 8px 12px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    .legend {
      display: flex;
      gap: 15px;
      margin: 10px 0;
      flex-wrap: wrap;
      font-size: 13px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .legend-box {
      width: 15px;
      height: 15px;
      border-radius: 3px;
    }

    @media (max-width: 600px) {
      .cards {
        grid-template-columns: 1fr 1fr;
      }

      table {
        display: block;
        overflow-x: auto;
      }

      .topbar {
        flex-direction: column;
        text-align: center;
      }
    }
  </style>
</head>

<body>

<header class="topbar">
  <h2 style="margin:0">🏫 College Resource Booking</h2>
  <span id="userInfo"></span>
  <button onclick="logout()">Logout</button>
</header>

<div class="dashboard">
  <h3 class="section-title">Available Resources</h3>

  <div class="cards">
    <!-- cards unchanged -->
  </div>

  <div class="booking-panel" id="bookingPanel">
    <h3 id="resourceTitle">Book Resource</h3>
    <label>Date</label>
    <input type="date" id="date">

    <label>Time Slot</label>
    <select id="time">
      <option value="">-- Select Time Slot --</option>
      <option value="8-9">8:00 - 9:00</option>
      <option value="9-10">9:00 - 10:00</option>
      <option value="10-11">10:00 - 11:00</option>
      <option value="11-12">11:00 - 12:00</option>
      <option value="12-13">12:00 - 1:00</option>
      <option value="13-14">1:00 - 2:00</option>
      <option value="14-15">2:00 - 3:00</option>
      <option value="15-16">3:00 - 4:00</option>
      <option value="16-17">4:00 - 5:00</option>
    </select>

    <button onclick="confirmBooking()">Confirm Booking</button>
    <p id="msg"></p>
  </div>

  <h3 class="section-title" id="historyTitle">Booking History</h3>

  <table>
    <thead>
      <tr id="tableHeader">
        <th>Resource</th>
        <th>Date</th>
        <th>Time</th>
        <th>User</th>
        <th>Status</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="history"></tbody>
  </table>
</div>

<script src="js/script.js"></script>

</body>
</html>
